<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CNC Handbook">
<meta name="theme-color" content="#0a0e14">
<title>CNC Handbook</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e14;--surface:#111620;--panel:#171d2b;--border:#1e2840;--accent:#00b4d8;--accent2:#f77f00;--text:#d4dbe8;--muted:#5a6580;--key:#1a2236;--g:#00b4d8;--m:#f77f00;--warn:#f7c948;--mono:'JetBrains Mono',monospace}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.logo{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--accent);text-transform:uppercase;white-space:nowrap}
.logo span{color:var(--muted)}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ctrl-wrap{position:relative}
.ctrl-btn{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.ctrl-btn .arr{font-size:10px;color:var(--muted);transition:transform .2s}
.ctrl-btn.open .arr{transform:rotate(180deg)}
.ctrl-menu{position:absolute;right:0;top:calc(100% + 4px);background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:100;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none}
.ctrl-menu.show{display:block}
.ctrl-item{padding:10px 14px;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);cursor:pointer;letter-spacing:.05em;transition:background .1s}
.ctrl-item:hover,.ctrl-item:active{background:var(--surface)}
.ctrl-item.active{color:var(--accent)}
.ctrl-divider{height:1px;background:var(--border)}
.mode-toggle{display:flex;gap:3px;background:var(--surface);border-radius:6px;padding:3px}
.mode-btn{font-family:var(--mono);font-size:11px;font-weight:600;padding:5px 9px;border-radius:4px;border:none;cursor:pointer;background:transparent;color:var(--muted);letter-spacing:.05em;transition:all .15s}
.mode-btn.active{background:var(--accent);color:#000}
#output{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);text-align:center;padding:0 24px}
.placeholder svg{opacity:.25}
.placeholder p{font-size:13px;line-height:1.65;max-width:240px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden;animation:slideIn .15s ease;flex-shrink:0}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.card-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.badge{font-family:var(--mono);font-size:13px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.05em;flex-shrink:0}
.badge-g{background:rgba(0,180,216,.15);color:var(--g);border:1px solid rgba(0,180,216,.3)}
.badge-m{background:rgba(247,127,0,.15);color:var(--m);border:1px solid rgba(247,127,0,.3)}
.badge-b{background:rgba(247,127,0,.12);color:var(--accent2);border:1px solid rgba(247,127,0,.3)}
.card-title{font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-title-mono{font-family:var(--mono);font-size:11px;color:var(--muted);font-weight:400;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chevron{color:var(--muted);font-size:14px;flex-shrink:0;transition:transform .2s;margin-left:4px}
.chevron.open{transform:rotate(180deg)}
.summary{padding:7px 14px 9px;font-size:12px;color:var(--muted);line-height:1.5;border-top:1px solid var(--border)}
.body{padding:12px 14px;font-size:13px;line-height:1.75;color:var(--text);border-top:1px solid var(--border)}
.body-desc{color:var(--muted);font-size:12px;margin-bottom:10px}
.ctrl-tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:rgba(0,180,216,.1);color:var(--accent);border:1px solid rgba(0,180,216,.2);letter-spacing:.06em;margin-bottom:8px}
.kw{color:var(--accent);text-decoration:underline dotted;text-underline-offset:2px;cursor:pointer;font-weight:500}
.kw:hover{color:#fff}
.sub-block{margin:0 14px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.sub-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);padding:5px 10px;border-bottom:1px solid var(--border);text-transform:uppercase}
.code-pre{font-family:var(--mono);font-size:12px;color:#8ecae6;padding:8px 10px;white-space:pre;overflow-x:auto;line-height:1.7}
.line-table{border-collapse:collapse;width:100%;display:block;padding:4px 10px}
.line-table td{padding:4px 0;font-size:12px;line-height:1.55;vertical-align:top}
.lc{font-family:var(--mono);font-weight:700;padding-right:12px;white-space:nowrap}
.rec-block{margin:0 14px 10px;background:rgba(247,201,72,.06);border:1px solid rgba(247,201,72,.25);border-radius:6px;overflow:hidden}
.rec-label{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--warn);padding:5px 10px;border-bottom:1px solid rgba(247,201,72,.15);text-transform:uppercase}
.rec-list{padding:8px 10px 8px 26px}
.rec-list li{font-size:12px;color:var(--warn);line-height:1.6;margin-bottom:3px}
.loading{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:18px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.spinner{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .7s linear infinite;flex-shrink:0}
.err{background:rgba(220,50,50,.08);border:1px solid rgba(220,50,50,.25);border-radius:8px;padding:14px;font-size:13px;color:#ff7070;font-family:var(--mono);flex-shrink:0}
#input-area{flex-shrink:0;border-top:1px solid var(--border);background:var(--surface)}
.display-row{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
#code-display{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent);min-height:46px;letter-spacing:.08em;overflow-x:auto;white-space:nowrap}
#code-display.empty{color:var(--muted);font-size:14px;font-weight:400}
.del-btn{width:46px;height:46px;border-radius:6px;border:1px solid var(--border);background:var(--key);color:var(--muted);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
#keypad{padding:2px 10px 6px}
.gm-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.gm-btn{height:54px;border-radius:8px;border:2px solid;font-family:var(--mono);font-size:24px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .08s;user-select:none}
.gm-btn.g{border-color:rgba(0,180,216,.4);background:rgba(0,180,216,.08);color:var(--g)}
.gm-btn.g:active{background:rgba(0,180,216,.2);border-color:var(--g)}
.gm-btn.m{border-color:rgba(247,127,0,.4);background:rgba(247,127,0,.08);color:var(--m)}
.gm-btn.m:active{background:rgba(247,127,0,.2);border-color:var(--m)}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.key-btn{height:54px;border-radius:8px;border:1px solid var(--border);background:var(--key);color:var(--text);font-family:var(--mono);font-size:20px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:background .08s;user-select:none}
.key-btn:active{background:#263654}
.action-row{display:grid;grid-template-columns:1fr 2fr;gap:6px;margin-bottom:4px}
.clr-btn{height:48px;border-radius:8px;border:1px solid var(--border);background:var(--key);color:var(--muted);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.05em;-webkit-tap-highlight-color:transparent}
.enter-btn{height:48px;border-radius:8px;border:none;background:var(--accent);color:#000;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.08em;-webkit-tap-highlight-color:transparent;transition:opacity .15s}
.enter-btn:disabled{opacity:.35;cursor:not-allowed}
#block-wrap{padding:10px 12px;display:none}
#block-wrap.show{display:block}
#block-ta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--mono);font-size:16px;color:var(--text);resize:none;outline:none;height:110px;line-height:1.65;caret-color:var(--accent)}
#block-ta:focus{border-color:var(--accent)}
.block-actions{display:flex;gap:8px;margin-top:6px}
.block-clr{padding:0 16px;height:42px;border-radius:6px;border:1px solid var(--border);background:var(--key);color:var(--muted);font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer}
.block-enter{flex:1;height:42px;border-radius:6px;border:none;background:var(--accent2);color:#000;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:opacity .15s}
.block-enter:disabled{opacity:.35;cursor:not-allowed}
#ios-hint{display:none;align-items:center;gap:10px;padding:8px 14px;background:rgba(0,180,216,.1);border-bottom:1px solid rgba(0,180,216,.2);font-size:12px;color:var(--accent)}
#ios-hint.show{display:flex}
#ios-hint button{margin-left:auto;padding:4px 10px;border-radius:4px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="ios-hint"><span>📲 Tap Share → Add to Home Screen</span><button onclick="this.parentElement.style.display='none'">✕</button></div>
  <header>
    <div class="logo">CNC <span>//</span> Handbook</div>
    <div class="header-right">
      <div class="ctrl-wrap">
        <div class="ctrl-btn" id="ctrl-btn" onclick="toggleCtrlMenu()">
          <span id="ctrl-label">FANUC</span><span class="arr">▾</span>
        </div>
        <div class="ctrl-menu" id="ctrl-menu">
          <div class="ctrl-item active" onclick="selectCtrl('fanuc','FANUC',this)">Fanuc</div>
          <div class="ctrl-divider"></div>
          <div class="ctrl-item" onclick="selectCtrl('okuma','OKUMA',this)">Okuma</div>
          <div class="ctrl-divider"></div>
          <div class="ctrl-item" onclick="selectCtrl('mazak','MAZAK',this)">Mazak</div>
        </div>
      </div>
      <div class="mode-toggle">
        <button class="mode-btn active" onclick="setMode('single')">Code</button>
        <button class="mode-btn" onclick="setMode('block')">Block</button>
      </div>
    </div>
  </header>
  <div id="output">
    <div class="placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="8" width="40" height="32" rx="3" stroke="#5a6580" stroke-width="2"/>
        <path d="M12 18h8M12 24h14M12 30h10" stroke="#5a6580" stroke-width="2" stroke-linecap="round"/>
        <path d="M30 20l6 4-6 4" stroke="#00b4d8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <p id="ph-text">Select a controller, enter a code, then press Look Up.</p>
    </div>
  </div>
  <div id="input-area">
    <div id="single-wrap">
      <div class="display-row">
        <div id="code-display" class="empty">Enter code…</div>
        <button class="del-btn" onclick="delLast()">⌫</button>
      </div>
      <div id="keypad">
        <div class="gm-row">
          <button class="gm-btn g" onclick="pressL('G')">G</button>
          <button class="gm-btn m" onclick="pressL('M')">M</button>
        </div>
        <div class="num-grid">
          <button class="key-btn" onclick="pressN('7')">7</button>
          <button class="key-btn" onclick="pressN('8')">8</button>
          <button class="key-btn" onclick="pressN('9')">9</button>
          <button class="key-btn" onclick="pressN('4')">4</button>
          <button class="key-btn" onclick="pressN('5')">5</button>
          <button class="key-btn" onclick="pressN('6')">6</button>
          <button class="key-btn" onclick="pressN('1')">1</button>
          <button class="key-btn" onclick="pressN('2')">2</button>
          <button class="key-btn" onclick="pressN('3')">3</button>
          <button class="key-btn" style="color:var(--muted);font-size:20px" onclick="pressN('-')">±</button>
          <button class="key-btn" onclick="pressN('0')">0</button>
          <button class="key-btn" style="color:var(--muted)" onclick="pressN('.')">.</button>
        </div>
        <div class="action-row">
          <button class="clr-btn" onclick="clearAll()">CLR</button>
          <button class="enter-btn" id="enter-btn" onclick="lookupCode()" disabled>LOOK UP</button>
        </div>
      </div>
    </div>
    <div id="block-wrap">
      <textarea id="block-ta" placeholder="Paste or type a G-code block here…&#10;E.g.&#10;G21 G90 G94&#10;T1 M6&#10;G0 X50 Y50&#10;G43 H1 Z5&#10;M3 S3000&#10;G1 Z-2 F200"></textarea>
      <div class="block-actions">
        <button class="block-clr" onclick="document.getElementById('block-ta').value=''">CLR</button>
        <button class="block-enter" id="block-enter-btn" onclick="analyseBlock()">ANALYSE BLOCK</button>
      </div>
    </div>
  </div>
</div>
<script>
// ── FANUC DATABASE ──
const FANUC = {
"G00":{title:"Rapid Positioning",description:"Moves axes to target position at maximum rapid speed — no cutting.",details:"Modal, Group 01. Feed rate F is ignored. Axes move simultaneously in a non-linear path. Always ensure the tool is clear of the workpiece before G00. G00 does not guarantee a straight-line path between points.",keywords:["rapid traverse","positioning","Group 01","modal"],example_code:"G00 X100.0 Y50.0 Z5.0",example_context:"Positioning above workpiece before beginning a cut."},
"G01":{title:"Linear Interpolation",description:"Moves the tool in a straight line at the programmed feed rate F.",details:"Modal, Group 01. Requires an active F word. All programmed axes move simultaneously, arriving at the endpoint together to produce a true straight-line path. Feed rate mode is set by G94 (mm/min) or G95 (mm/rev).",keywords:["linear interpolation","feed rate","cutting","Group 01"],example_code:"G01 X50.0 Y25.0 Z-5.0 F200",example_context:"All straight cutting moves — facing, profiling, boring feeds."},
"G02":{title:"Circular Interpolation CW",description:"Moves the tool in a clockwise arc at the programmed feed rate.",details:"Modal, Group 01. Arc defined by I, J, K (centre offsets from start) or R (radius). I/J/K is more reliable for full circles. Plane selected by G17/G18/G19. Full circles cannot use R — use I/J/K.",keywords:["arc","clockwise","CW","I word","J word","K word","R word","circular"],example_code:"G02 X30.0 Y0.0 I15.0 J0.0 F150",example_context:"Milling circular profiles, pockets, and corner radii."},
"G03":{title:"Circular Interpolation CCW",description:"Moves the tool in a counter-clockwise arc at the programmed feed rate.",details:"Modal, Group 01. Identical parameters to G02. Direction viewed from the positive side of the perpendicular axis. Use G03 for inside corners and CCW arcs.",keywords:["arc","counter-clockwise","CCW","I word","J word","R word"],example_code:"G03 X0.0 Y30.0 I0.0 J15.0 F150",example_context:"Counter-clockwise arcs and inside profile corners."},
"G04":{title:"Dwell",description:"Pauses program execution for a specified time without moving any axis.",details:"Non-modal. P = dwell in milliseconds (integer); X = dwell in seconds (decimal). G04 P500 = 0.5s, G04 X1.5 = 1.5s. Used to allow spindle to reach speed, clear chips, or let a boring tool dwell at the bottom for a cleaner finish.",keywords:["dwell","pause","P word","X word","boring","chip"],example_code:"G04 P500",example_context:"After reaching the bottom of a bore to improve surface finish before retract."},
"G09":{title:"Exact Stop Check",description:"Commands the machine to decelerate to an exact stop at the end of the current block only.",details:"Non-modal (one-shot). Applies only to the block it appears in. G61 activates exact stop permanently for all blocks. Useful at precision corners where blending would cause dimensional error.",keywords:["exact stop","corner","deceleration","accuracy"],example_code:"G01 X50.0 F200 G09",example_context:"Precision square corners where path blending would cause rounding."},
"G10":{title:"Programmable Data Input",description:"Sets tool offsets, work offsets, or parameters directly within the part program.",details:"Used to write to the offset table from the program. G10 L2 P1 sets G54; G10 L10 P1 R_ sets tool radius. Eliminates manual offset entry for automated setups.",keywords:["offset","work coordinate","tool length","programmable","L word","P word"],example_code:"G10 L2 P1 X-100.0 Y-50.0 Z-200.0",example_context:"Automated setups where probe data is used to set work offsets programmatically."},
"G17":{title:"XY Plane Selection",description:"Selects the XY plane for circular interpolation and cutter compensation.",details:"Modal, Group 02. Default on machining centres. Required for G02/G03 arcs in XY and for G41/G42 cutter compensation.",keywords:["XY plane","plane selection","arc","cutter compensation","Group 02"],example_code:"G17 G02 X30.0 Y0.0 I15.0 J0.0 F150",example_context:"Set at program start on machining centres — rarely needs changing."},
"G18":{title:"XZ Plane Selection",description:"Selects the XZ plane for circular interpolation — default on turning centres.",details:"Modal, Group 02. Required for G02/G03 arcs in XZ. Standard on lathes. Uses I and K for arc centre offsets.",keywords:["XZ plane","turning","lathe","plane selection","Group 02"],example_code:"G18 G02 X30.0 Z-10.0 I15.0 K0.0 F100",example_context:"Turning centre corner radii and profile arcs."},
"G19":{title:"YZ Plane Selection",description:"Selects the YZ plane for circular interpolation.",details:"Modal, Group 02. Less common — used on multi-axis machines or for specific 3D contouring.",keywords:["YZ plane","multi-axis","Group 02"],example_code:"G19 G03 Y20.0 Z-10.0 J10.0 K0.0 F120",example_context:"Multi-axis operations requiring arcs in the YZ plane."},
"G20":{title:"Imperial Units (Inch)",description:"Sets all programmed values to imperial inches.",details:"Modal, Group 06. Coordinates in inches, feed in in/min or in/rev, offsets must be in inches.",keywords:["inch","imperial","units","Group 06"],example_code:"G20 G90\nG00 X1.0 Y0.5",example_context:"Imperial inch programming, common in North American shops."},
"G21":{title:"Metric Units (mm)",description:"Sets all programmed values to metric millimetres.",details:"Modal, Group 06. Default on metric machines. Feed in mm/min (G94) or mm/rev (G95). All offsets in mm.",keywords:["metric","millimetre","mm","units","Group 06"],example_code:"G21 G90\nG00 X100.0 Y50.0",example_context:"Set at the start of every metric program."},
"G28":{title:"Return to Machine Zero",description:"Returns the specified axes to machine zero via a safe intermediate point.",details:"Axes move to the intermediate point first, then to machine zero. Always specify a safe Z intermediate position. G28 cancels tool length compensation automatically.",keywords:["home","machine zero","reference point","intermediate","tool length"],example_code:"G28 G91 Z0\nG28 G91 X0 Y0",example_context:"End of program or before tool change to safely home the machine."},
"G29":{title:"Return from Machine Zero",description:"Returns axes from machine zero via the stored intermediate point to the programmed position.",details:"Non-modal. Uses the intermediate point stored by the last G28 or G30 command.",keywords:["return from home","intermediate point","G28"],example_code:"G29 X50.0 Y25.0 Z5.0",example_context:"Returning to the work area after a tool change via the same intermediate point."},
"G30":{title:"2nd/3rd/4th Reference Return",description:"Returns axes to a secondary reference position — often the tool change position.",details:"Non-modal. P2 = 2nd reference (default), P3, P4 also available. Works like G28 with an intermediate point.",keywords:["2nd reference","tool change","reference","P word"],example_code:"G30 P2 Z0",example_context:"Moving to a tool changer not located at machine zero."},
"G31":{title:"Skip Function",description:"Moves until a probe or sensor skip signal is received, then records position and stops.",details:"Non-modal. Position at skip stored in system variables #5061–#5068. Used for in-process gauging and tool length measurement.",keywords:["skip","probe","gauging","measurement","system variables"],example_code:"G31 Z-50.0 F100",example_context:"Automatic tool length measurement with a tool setter."},
"G33":{title:"Thread Cutting",description:"Cuts a single-pass thread synchronising axis feed with spindle rotation.",details:"Modal, Group 01. F word = thread lead (pitch) in mm/rev. Requires spindle encoder. Multiple passes needed. G76 or G84 preferred for automatic cycles.",keywords:["thread","pitch","spindle encoder","synchronisation","lead"],example_code:"G33 Z-30.0 F1.5",example_context:"Single-point thread cutting on a lathe requiring manual pass management."},
"G40":{title:"Cancel Cutter Radius Compensation",description:"Cancels cutter radius compensation — tool returns to programmed path.",details:"Modal, Group 07. Must be cancelled on a straight-line move (G00 or G01). Always cancel before tool change or end of program.",keywords:["cutter compensation","cancel","G41","G42","Group 07"],example_code:"G40 G00 X0 Y0",example_context:"End of a compensated profile before retracting or changing tools."},
"G41":{title:"Cutter Radius Compensation Left",description:"Offsets the tool path to the left of travel by the D register amount.",details:"Modal, Group 07. 'Left' relative to direction of travel. D word = offset register number. Requires a straight-line lead-in move to activate.",keywords:["cutter compensation","left","D word","climb milling","lead-in","Group 07"],example_code:"G41 D01 G01 X10.0 Y0.0 F200",example_context:"Outside profile climb milling using the stored tool radius offset."},
"G42":{title:"Cutter Radius Compensation Right",description:"Offsets the tool path to the right of travel by the D register amount.",details:"Modal, Group 07. 'Right' relative to direction of travel. D word = offset register. Requires straight-line lead-in.",keywords:["cutter compensation","right","D word","conventional milling","Group 07"],example_code:"G42 D01 G01 X10.0 Y0.0 F200",example_context:"Inside profile machining or conventional milling on outside profiles."},
"G43":{title:"Tool Length Compensation +",description:"Applies positive tool length offset (H register) to the Z axis.",details:"Modal, Group 08. H word references the offset register. Activated on first Z move after tool change. Compensates for tool length so Z coordinates relate to the workpiece surface, not the spindle gauge line.",keywords:["tool length","H word","Z offset","offset register","Group 08"],example_code:"G43 H01 Z50.0",example_context:"First Z approach move immediately after every tool change."},
"G44":{title:"Tool Length Compensation -",description:"Applies negative tool length offset to Z axis.",details:"Modal, Group 08. Subtracts H register value from Z. Less common — G43 with a stored negative value is preferred on modern machines.",keywords:["tool length","negative","H word","Group 08"],example_code:"G44 H01 Z50.0",example_context:"Legacy programs using positive offset values meant to be subtracted."},
"G49":{title:"Cancel Tool Length Compensation",description:"Cancels active tool length compensation (G43 or G44).",details:"Modal, Group 08. G28 also cancels TLC automatically. Always cancel before changing tools to avoid cumulative offset errors.",keywords:["tool length","cancel","G43","G44","Group 08"],example_code:"G49 G00 Z100.0",example_context:"Before every tool change and at end of program."},
"G52":{title:"Local Coordinate System",description:"Temporarily shifts the active work coordinate origin by the programmed amount.",details:"Non-modal. G52 X_ Y_ Z_ offsets from the current work coordinate. Cancel with G52 X0 Y0 Z0. Useful for repeated features at multiple locations.",keywords:["local coordinate","shift","origin","work offset"],example_code:"G52 X50.0 Y25.0\nG00 X0 Y0\nG52 X0 Y0",example_context:"Machining the same feature pattern at multiple locations on a fixture."},
"G53":{title:"Machine Coordinate System Move",description:"Commands a single block of motion in machine coordinates, ignoring work offsets.",details:"Non-modal (one-shot). Overrides the active work coordinate for one block only. Used to move to fixed machine positions like tool changers.",keywords:["machine coordinate","absolute","work offset override","tool change"],example_code:"G53 G00 Z0",example_context:"Moving to a fixed machine position such as the ATC or pallet station."},
"G54":{title:"Work Coordinate System 1",description:"Selects work coordinate system 1 — the most commonly used fixture offset.",details:"Modal, Group 14. G54 through G59 are the six standard work offsets. Offset values stored in the control's offset table define where program zero is relative to machine zero.",keywords:["work coordinate","fixture offset","origin","G54","Group 14"],example_code:"G54 G90 G00 X0 Y0",example_context:"Program start — defines the workpiece origin, typically top-face corner of the part."},
"G55":{title:"Work Coordinate System 2",description:"Selects work coordinate system 2.",details:"Modal, Group 14. Independent offset values from G54. Used for a second fixture or workpiece in a multi-setup operation.",keywords:["work coordinate","fixture","Group 14"],example_code:"G55 G00 X0 Y0",example_context:"Second fixture in a multi-part setup."},
"G56":{title:"Work Coordinate System 3",description:"Selects work coordinate system 3.",details:"Modal, Group 14.",keywords:["work coordinate","fixture","Group 14"],example_code:"G56 G00 X0 Y0",example_context:"Third fixture position."},
"G57":{title:"Work Coordinate System 4",description:"Selects work coordinate system 4.",details:"Modal, Group 14.",keywords:["work coordinate","fixture","Group 14"],example_code:"G57 G00 X0 Y0",example_context:"Fourth fixture position."},
"G58":{title:"Work Coordinate System 5",description:"Selects work coordinate system 5.",details:"Modal, Group 14.",keywords:["work coordinate","fixture","Group 14"],example_code:"G58 G00 X0 Y0",example_context:"Fifth fixture position."},
"G59":{title:"Work Coordinate System 6",description:"Selects work coordinate system 6.",details:"Modal, Group 14. Additional offsets G54.1 P1–P48 available on Fanuc 16/18/21i and later.",keywords:["work coordinate","fixture","Group 14"],example_code:"G59 G00 X0 Y0",example_context:"Sixth fixture — last standard work offset."},
"G61":{title:"Exact Stop Mode",description:"All blocks end with a complete stop — improves corner accuracy at the cost of cycle time.",details:"Modal, Group 15. Every block fully decelerates and stops. Cancelled by G64. Use G09 for single-block exact stop.",keywords:["exact stop","corner","accuracy","G64","Group 15"],example_code:"G61\nG01 X50.0 F200\nG64",example_context:"Precision square corners where path blending causes unacceptable rounding."},
"G64":{title:"Cutting Mode (Path Blending)",description:"Default mode — the control smoothly blends motion between blocks.",details:"Modal, Group 15. Reduces cycle time by maintaining speed through corners. May cause slight corner rounding. Cancels G61.",keywords:["cutting mode","path blending","smooth","contouring","Group 15"],example_code:"G64 G01 X50.0 F300",example_context:"Default for all contouring and profiling operations."},
"G65":{title:"Custom Macro Call",description:"Calls a macro subprogram with optional argument passing.",details:"Non-modal. G65 P_ calls macro O number P. Arguments passed via address letters stored in variables #1–#26. G66 for modal repeat. G67 cancels G66.",keywords:["macro","custom macro","subprogram","parametric","argument","P word"],example_code:"G65 P9010 A10.0 B5.0",example_context:"Calling probing routines, parametric hole patterns, or custom cycles."},
"G66":{title:"Macro Modal Call",description:"Calls a macro after every subsequent motion block until cancelled by G67.",details:"Modal, Group 12. Useful for operations performed at multiple positions (e.g. probe, measure, adjust).",keywords:["macro","modal","G67","Group 12"],example_code:"G66 P9010 A5.0\nG00 X10.0\nG67",example_context:"Probing or measuring at each position in a series of moves."},
"G67":{title:"Cancel Macro Modal Call",description:"Cancels G66 modal macro call.",details:"Modal, Group 12.",keywords:["macro","cancel","G66","Group 12"],example_code:"G67",example_context:"End of G66 modal macro sequence."},
"G68":{title:"Coordinate System Rotation",description:"Rotates the active coordinate system by the specified angle.",details:"Modal, Group 16. G68 X_ Y_ R_ rotates around point X,Y by R degrees. G17 must be active for XY rotation. Cancelled by G69.",keywords:["rotation","coordinate rotation","angle","R word","Group 16"],example_code:"G68 X0 Y0 R45.0\nG00 X10.0\nG69",example_context:"Machining a pattern at an angle without reprogramming all coordinates."},
"G69":{title:"Cancel Coordinate Rotation",description:"Cancels G68 coordinate system rotation.",details:"Modal, Group 16.",keywords:["rotation","cancel","G68","Group 16"],example_code:"G69",example_context:"After completing rotated coordinate machining."},
"G73":{title:"High Speed Peck Drilling",description:"Peck drilling with small retract between pecks — breaks chips without full retraction.",details:"Modal canned cycle, Group 09. Q = peck depth increment. Small retract (parameter-set) between pecks. Faster than G83. Good for cast iron and aluminium.",keywords:["peck drilling","chip breaking","canned cycle","Q word","Group 09"],example_code:"G73 X25.0 Y25.0 Z-30.0 R5.0 Q5.0 F120",example_context:"Medium-depth holes where chip breaking is needed but full retract is unnecessary."},
"G74":{title:"Left-Hand Tapping Cycle",description:"Counter-clockwise rigid tapping cycle for left-hand threads.",details:"Modal canned cycle, Group 09. Spindle CCW on entry, reverses CW on retract. F = S × pitch. Requires rigid tapping.",keywords:["left-hand tap","tapping","rigid tapping","CCW","Group 09"],example_code:"G74 X25.0 Y25.0 Z-20.0 R5.0 F625 S500",example_context:"Machining left-hand threads such as M8LH."},
"G76":{title:"Fine Boring Cycle",description:"Bores to depth, orients spindle, shifts tool, retracts cleanly without marking the bore.",details:"Modal canned cycle, Group 09. At depth, spindle stops at fixed orientation, tool shifts away from bore wall, then retracts. Q = shift amount. Produces high-quality bore finish.",keywords:["boring","fine boring","spindle orient","bore finish","Q word","Group 09"],example_code:"G76 X50.0 Y0.0 Z-40.0 R5.0 Q0.1 F80",example_context:"Finishing precision bores where surface finish and diameter accuracy are critical."},
"G80":{title:"Cancel Canned Cycle",description:"Cancels all active canned cycles (G73, G74, G76, G81–G89).",details:"Modal, Group 09. Also cancelled automatically by any Group 01 code. Always explicitly program G80 after the last hole.",keywords:["cancel","canned cycle","Group 09"],example_code:"G80 G00 Z50.0",example_context:"After the last hole in every canned cycle sequence."},
"G81":{title:"Drilling Cycle",description:"Feed to depth at F, then rapid retract to R plane.",details:"Modal canned cycle, Group 09. Simplest canned cycle. No dwell. Subsequent X/Y moves drill more holes until G80 cancels.",keywords:["drilling","canned cycle","R plane","Group 09"],example_code:"G81 X25.0 Y25.0 Z-20.0 R5.0 F150",example_context:"Through holes, counterbored clearance holes, simple drilling."},
"G82":{title:"Drilling Cycle with Dwell",description:"Drill cycle that dwells at the bottom before retracting.",details:"Modal canned cycle, Group 09. P = dwell in milliseconds. Improves finish on counterbore floors and spot drill points.",keywords:["drilling","dwell","counterbore","P word","Group 09"],example_code:"G82 X25.0 Y25.0 Z-15.0 R5.0 P500 F150",example_context:"Counterboring and spot drilling where flat bottom finish matters."},
"G83":{title:"Deep Hole Peck Drilling",description:"Full-retract peck drilling — returns to R plane between pecks to clear chips.",details:"Modal canned cycle, Group 09. Q = peck increment. Fully retracts between each peck. Essential for deep holes in steel and stainless.",keywords:["peck drilling","deep hole","chip clearance","Q word","R plane","Group 09"],example_code:"G83 X25.0 Y25.0 Z-60.0 R5.0 Q8.0 F100",example_context:"Deep holes where chip packing and heat buildup are concerns."},
"G84":{title:"Tapping Cycle",description:"Right-hand rigid tapping cycle — feeds to depth then reverses spindle to retract.",details:"Modal canned cycle, Group 09. F must equal S × pitch. Requires rigid tapping. M29 activates rigid mode on some machines. Most commonly used tapping cycle.",keywords:["tapping","rigid tapping","thread","pitch","M29","Group 09"],example_code:"G84 X25.0 Y25.0 Z-20.0 R5.0 F600 S400",example_context:"Standard right-hand thread tapping on machining centres."},
"G85":{title:"Boring Cycle",description:"Bores to depth, retracts at feed rate — produces good finish on both wall strokes.",details:"Modal canned cycle, Group 09. Both entry and exit at feed rate. Used for reaming and finish boring.",keywords:["boring","reaming","feed retract","Group 09"],example_code:"G85 X25.0 Y25.0 Z-30.0 R5.0 F80",example_context:"Reaming and finish boring where the upward feed stroke aids surface quality."},
"G86":{title:"Boring Cycle with Spindle Stop",description:"Bores to depth, stops spindle, rapid retracts.",details:"Modal canned cycle, Group 09. Spindle stops at bottom before rapid retract — avoids marking bore during retract. Superseded by G76 for precision work.",keywords:["boring","spindle stop","rapid retract","Group 09"],example_code:"G86 X25.0 Y25.0 Z-30.0 R5.0 F80",example_context:"Semi-finish boring where precision is secondary to cycle time."},
"G87":{title:"Back Boring Cycle",description:"Bores from beneath the workpiece, cutting on the upward stroke.",details:"Modal canned cycle, Group 09. Spindle orients, shifts, rapids to start, re-centres, then cuts upward. Used for undercuts and back-chamfers.",keywords:["back boring","undercut","spindle orient","Group 09"],example_code:"G87 X25.0 Y25.0 Z-5.0 R-40.0 Q0.5 F60",example_context:"Back-chamfering or boring features only accessible from below the workpiece."},
"G88":{title:"Boring Cycle with Manual Retract",description:"Bores to depth, dwells, stops spindle — operator manually retracts before cycle continues.",details:"Modal canned cycle, Group 09. After dwell (P ms), spindle stops and feed hold activates. Operator retracts manually, then presses Cycle Start. Rarely used in modern production.",keywords:["boring","manual retract","dwell","feed hold","Group 09"],example_code:"G88 X25.0 Y25.0 Z-30.0 R5.0 P500 F80",example_context:"Legacy precision boring requiring manual tool retract inspection."},
"G89":{title:"Boring Cycle with Dwell",description:"Bores to depth, dwells, then retracts at feed rate.",details:"Modal canned cycle, Group 09. Combines G82 dwell with G85 feed retract for best bore finish.",keywords:["boring","dwell","feed retract","P word","Group 09"],example_code:"G89 X25.0 Y25.0 Z-30.0 R5.0 P300 F80",example_context:"Precision reaming or boring where both dwell and smooth retract are needed."},
"G90":{title:"Absolute Programming",description:"All coordinates are absolute positions from the program origin.",details:"Modal, Group 03. Standard mode — all X, Y, Z values reference a fixed origin set by the active work offset. Most common programming mode.",keywords:["absolute","coordinate mode","origin","Group 03"],example_code:"G90 G00 X100.0 Y50.0",example_context:"Standard mode used throughout most programs."},
"G91":{title:"Incremental Programming",description:"All coordinates are incremental distances from the current tool position.",details:"Modal, Group 03. Each value is distance and direction from current position. Useful for bolt hole patterns and repetitive features.",keywords:["incremental","relative","distance","Group 03"],example_code:"G91 G00 X10.0 Y0.0",example_context:"Equally-spaced holes or steps where the increment is constant."},
"G92":{title:"Coordinate System Setting",description:"Shifts the current coordinate system so the current position equals the programmed values.",details:"Affects current work coordinate. Does not physically move the tool. Legacy method — G54-G59 offsets are preferred.",keywords:["coordinate system","work zero","origin shift"],example_code:"G92 X0 Y0 Z0",example_context:"Legacy work zero setting — modern programs use G54-G59."},
"G94":{title:"Feed per Minute",description:"Sets feed rate mode to mm/min (or in/min in G20 mode).",details:"Modal, Group 05. Standard milling feed mode. F value = mm/min.",keywords:["feed rate","mm/min","Group 05"],example_code:"G94 G01 X50.0 F200",example_context:"Set at start of all milling programs."},
"G95":{title:"Feed per Revolution",description:"Sets feed rate mode to mm per spindle revolution.",details:"Modal, Group 05. F = mm/rev. Standard for turning operations. Ensures consistent chip load regardless of speed.",keywords:["feed per revolution","turning","chip load","mm/rev","Group 05"],example_code:"G95 G01 Z-50.0 F0.2",example_context:"All turning operations on a lathe or turning centre."},
"G96":{title:"Constant Surface Speed",description:"Maintains a constant cutting speed in m/min by automatically varying spindle RPM.",details:"Modal, Group 02 (turning). S = surface speed m/min. RPM decreases at larger diameters. Set maximum RPM with G50 S_. Cancelled by G97.",keywords:["constant surface speed","CSS","surface speed","turning","G97","G50"],example_code:"G96 S200 G01 X0 F0.15",example_context:"Turning operations across varying diameters for consistent tool life and finish."},
"G97":{title:"Constant Spindle Speed",description:"Fixed RPM mode — S word sets RPM directly.",details:"Modal, Group 02. Cancels G96. Used for milling, drilling, tapping. Also used as safe startup speed before G96.",keywords:["spindle speed","RPM","fixed","G96"],example_code:"G97 S1500 M03",example_context:"Milling, drilling, and tapping at a fixed RPM."},
"G98":{title:"Canned Cycle: Return to Initial Point",description:"Returns Z to the position it was at before the canned cycle started after each hole.",details:"Modal, Group 10. Use when obstacles between holes are above the R plane.",keywords:["canned cycle","initial point","Z retract","clearance","Group 10"],example_code:"G98 G81 X25.0 Y25.0 Z-20.0 R5.0 F150",example_context:"When clamps or fixtures between holes require the tool to retract above R plane."},
"G99":{title:"Canned Cycle: Return to R Plane",description:"Returns Z to the R plane (retract plane) after each hole — faster than G98.",details:"Modal, Group 10. Use when no obstacles exist between holes above R plane.",keywords:["canned cycle","R plane","retract","Group 10"],example_code:"G99 G81 X25.0 Y25.0 Z-20.0 R5.0 F150",example_context:"Standard hole patterns on a clear workpiece surface."},
"M00":{title:"Program Stop",description:"Stops the program, spindle, and coolant — press Cycle Start to continue.",details:"Non-modal. M00 always stops regardless of the Optional Stop switch. Operator can inspect, adjust offsets, change inserts, then resume.",keywords:["program stop","inspection","cycle start","halt"],example_code:"M00",example_context:"Mid-program inspection or insert change point."},
"M01":{title:"Optional Stop",description:"Stops only if the Optional Stop switch on the panel is ON.",details:"Non-modal. When switch is OFF, M01 is ignored. Allows operators to enable inspection stops during setup without editing the program.",keywords:["optional stop","inspection","switch","setup"],example_code:"M01",example_context:"Setup inspection points that can be skipped during production."},
"M02":{title:"Program End",description:"Signals end of program — stops spindle, coolant, and feed.",details:"Non-modal. On some controls M02 does not rewind. M30 is preferred.",keywords:["program end","reset"],example_code:"M02",example_context:"End of program — M30 preferred."},
"M03":{title:"Spindle CW",description:"Starts the spindle clockwise at the S speed.",details:"Non-modal. S = RPM (G97) or m/min (G96). CW is viewed from above on a vertical machining centre. Allow spindle to reach speed before cutting.",keywords:["spindle","clockwise","CW","S word","RPM"],example_code:"M03 S2000",example_context:"Right-hand cutting tool spindle start at beginning of each tool operation."},
"M04":{title:"Spindle CCW",description:"Starts the spindle counter-clockwise at the S speed.",details:"Non-modal. Used for left-hand tools or left-hand tapping. Direction convention may differ on lathes.",keywords:["spindle","CCW","counter-clockwise","left-hand"],example_code:"M04 S1500",example_context:"Left-hand taps, left-hand milling cutters."},
"M05":{title:"Spindle Stop",description:"Stops the spindle.",details:"Non-modal. Controlled deceleration. Does not orient — use M19 for fixed orientation. Always stop before tool change.",keywords:["spindle stop","halt"],example_code:"M05",example_context:"Before tool changes, at end of cut, before part measurement."},
"M06":{title:"Tool Change",description:"Executes an automatic tool change to the T-word specified tool.",details:"Non-modal. T word must precede or be in same block as M06. Machine moves to tool change position automatically. G28 Z0 before M06 ensures safe Z clearance.",keywords:["tool change","ATC","T word","automatic tool changer"],example_code:"T02 M06",example_context:"Between tool operations — always retract Z first with G28."},
"M07":{title:"Mist Coolant On",description:"Activates the mist coolant system.",details:"Non-modal. M09 cancels. On some machines M07 and M08 activate the same output.",keywords:["mist coolant","coolant","M09"],example_code:"M07",example_context:"Aluminium and non-ferrous machining where flood coolant is undesirable."},
"M08":{title:"Flood Coolant On",description:"Activates the flood coolant system.",details:"Non-modal. Most common coolant command. M09 cancels.",keywords:["flood coolant","coolant","chip flushing"],example_code:"M08",example_context:"General steel, stainless, and cast iron machining."},
"M09":{title:"Coolant Off",description:"Turns off all coolant.",details:"Non-modal. Cancels M07, M08, and through-spindle coolant. Always turn off before tool changes.",keywords:["coolant off","cancel"],example_code:"M09",example_context:"Before every tool change and at program end."},
"M19":{title:"Spindle Orientation",description:"Orients the spindle to a fixed angular position.",details:"Non-modal. Required before tool changes needing a keyed drive, and as part of the G76 fine boring retract sequence.",keywords:["spindle orient","orientation","tool change","G76"],example_code:"M19",example_context:"Before tool change with keyed spindle or before G76 fine boring retract."},
"M29":{title:"Rigid Tapping Mode",description:"Activates rigid tapping — synchronises spindle with Z feed for accurate tapping.",details:"Non-modal. Must precede G84 or G74. Without M29, G84 uses a floating tap holder. S = tapping speed.",keywords:["rigid tapping","synchronised","spindle encoder","G84","G74"],example_code:"M29 S500\nG84 X25.0 Y25.0 Z-20.0 R5.0 F750",example_context:"Required before G84 on machines with rigid tapping capability."},
"M30":{title:"Program End and Rewind",description:"Ends the program, resets the control, and rewinds to the program start.",details:"Non-modal. Preferred over M02. Stops spindle and coolant, resets all modal codes, returns cursor to start — ready for next cycle.",keywords:["program end","rewind","reset","cycle complete"],example_code:"M30",example_context:"The final code in every CNC program."},
"M48":{title:"Override Enable",description:"Re-enables feed rate and spindle speed override controls on the operator panel.",details:"Non-modal. Cancelled by M49.",keywords:["override","feed override","spindle override"],example_code:"M48",example_context:"After an M49 section, to restore operator control."},
"M49":{title:"Override Disable",description:"Locks feed rate and spindle speed overrides at 100%.",details:"Non-modal. Prevents operator from adjusting overrides during rigid tapping or critical operations. Cancelled by M48.",keywords:["override disable","lock","tapping","M48"],example_code:"M49",example_context:"During rigid tapping to prevent override from disrupting pitch accuracy."},
"M98":{title:"Subprogram Call",description:"Calls a subprogram by its O number.",details:"Non-modal. M98 P_ L_ — P = subprogram number, L = repeat count. Subprogram must end with M99. Up to 4 nesting levels.",keywords:["subprogram","call","M99","P word","L word"],example_code:"M98 P1001 L3",example_context:"Calling repeated patterns or tool change routines stored as subprograms."},
"M99":{title:"Subprogram Return",description:"Returns from subprogram to the calling program, or loops the main program.",details:"Non-modal. In subprogram: returns to line after M98. In main program: loops to start. M99 P_ jumps to specific sequence number.",keywords:["subprogram return","M98","loop"],example_code:"M99",example_context:"Last line of every subprogram."}
};

"G17":{title:"XY Plane",description:"Selects XY plane for arcs and cutter compensation.",details:"Modal. Default on Okuma machining centres.",keywords:["XY plane","arc","cutter compensation"],example_code:"G17 G02 X30.0 Y0.0 I15.0 J0.0 F150",example_context:"Milling centre program start."},

"G41":{title:"Cutter Compensation Left",description:"Tool path offset left of travel by D register amount.",details:"Modal. D word = offset register. Requires straight-line lead-in.",keywords:["cutter compensation","left","D word"],example_code:"G41 D01 G01 X10.0 Y0.0 F200",example_context:"Outside profile climb milling."},
"G42":{title:"Cutter Compensation Right",description:"Tool path offset right of travel by D register amount.",details:"Modal. D word = offset register.",keywords:["cutter compensation","right","D word"],example_code:"G42 D01 G01 X10.0 Y0.0 F200",example_context:"Inside profile machining."},

};

const DB = {fanuc:FANUC, okuma:OKUMA, mazak:MAZAK};
// ── APP LOGIC ──
const SYSTEM=`You are an expert CNC machining reference tool. Respond ONLY with valid JSON — no markdown, no backticks, no preamble.
For a SINGLE code: {"type":"single","code":"G01","title":"Linear Interpolation","description":"One concise sentence.","details":"3-5 sentences of detail.","keywords":["keyword1","keyword2"],"example_code":"G01 X50.0 Y25.0 F200","example_context":"Brief context."}
For a BLOCK: {"type":"block","summary":"One concise sentence.","lines":[{"code":"G21","explanation":"Sets units to mm."}],"details":"3-5 sentences.","example_context":"Where this appears.","recommendations":["Missing codes or safety notes. Empty array if none."]}
Return ONLY valid JSON.`;

let buf='',mode='single',busy=false,controller='fanuc',cardN=0;

function toggleCtrlMenu(){
  document.getElementById('ctrl-menu').classList.toggle('show');
  document.getElementById('ctrl-btn').classList.toggle('open');
}
function selectCtrl(id,label,el){
  controller=id;
  document.getElementById('ctrl-label').textContent=label;
  document.getElementById('ctrl-menu').classList.remove('show');
  document.getElementById('ctrl-btn').classList.remove('open');
  document.querySelectorAll('.ctrl-item').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.ctrl-wrap')){
    document.getElementById('ctrl-menu').classList.remove('show');
    document.getElementById('ctrl-btn').classList.remove('open');
  }
});

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='single')||(i===1&&m==='block')));
  document.getElementById('single-wrap').style.display=m==='single'?'block':'none';
  document.getElementById('block-wrap').classList.toggle('show',m==='block');
  document.getElementById('ph-text').textContent=m==='single'?'Select a controller, enter a code, then press Look Up.':'Paste a G-code block into the box below and tap Analyse Block.';
}

function pressL(l){
  const ns=(l==='G'||l==='M')&&buf.length>0&&!buf.endsWith(' ');
  buf=(ns?buf+' ':buf)+l;
  upd();
}
function pressN(n){if(n==='-'&&buf==='')return;buf+=n;upd();}
function delLast(){buf=buf.slice(0,-1);upd();}
function clearAll(){buf='';upd();}
function upd(){
  const el=document.getElementById('code-display');
  el.textContent=buf||'Enter code…';
  el.classList.toggle('empty',!buf);
  document.getElementById('enter-btn').disabled=!buf.trim()||busy;
}

function dbLookup(code){
  const db=DB[controller]||FANUC;
  const k=code.trim().toUpperCase().replace(/\s+/g,'');
  if(db[k])return{type:'single',code:k,...db[k]};
  const norm=k.replace(/^([GM])0*(\d+)$/,(_,p,n)=>p+(parseInt(n)<10?'0'+parseInt(n):parseInt(n)));
  if(db[norm])return{type:'single',code:norm,...db[norm]};
  return null;
}

async function callClaude(msg){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,
      system:SYSTEM+`\nController: ${controller.toUpperCase()}. Tailor your response to this controller.`,
      messages:[{role:'user',content:msg}]})});
  if(!r.ok)throw new Error('HTTP '+r.status);
  const d=await r.json();
  const raw=d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
  return JSON.parse(raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/i,'').trim());
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function linkify(text,kws){
  if(!kws||!kws.length)return esc(text);
  const pat=new RegExp('\\b('+kws.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|')+')\\b','gi');
  return esc(text).replace(pat,m=>`<span class="kw" onclick="lookupKw('${m.replace(/'/g,"\\'")}')">${m}</span>`);
}
function hidePH(){const p=document.getElementById('placeholder');if(p)p.style.display='none';}

function makeCard(result,isNew,inputBlock){
  const id='c'+(++cardN);
  const isG=result.code?.startsWith('G'),isM=result.code?.startsWith('M'),isBlock=result.type==='block';
  const bcls=isBlock?'badge-b':isG?'badge-g':'badge-m';
  const btext=result.code||'BLOCK';
  let titleH='';
  if(isBlock&&inputBlock){
    const lines=inputBlock.split('\n').filter(l=>l.trim());
    const prev=lines.slice(0,2).join('  ').substring(0,50)+(lines.length>2?'…':'');
    titleH=`<span class="card-title-mono">${esc(prev)}</span>`;
  }else{
    titleH=`<span class="card-title">${esc(result.title||'Result')}</span>`;
  }
  let linesH='';
  if(result.lines){
    const rows=result.lines.map(l=>`<tr><td class="lc" style="color:${l.code.startsWith('G')?'var(--g)':l.code.startsWith('M')?'var(--m)':'var(--text)'}">${esc(l.code)}</td><td>${esc(l.explanation)}</td></tr>`).join('');
    linesH=`<div class="sub-block"><div class="sub-label">Line-by-line</div><table class="line-table"><tbody>${rows}</tbody></table></div>`;
  }
  let inputH=isBlock&&inputBlock?`<div class="sub-block"><div class="sub-label">Input Block</div><div class="code-pre">${esc(inputBlock)}</div></div>`:'';
  let recH=result.recommendations?.length?`<div class="rec-block"><div class="rec-label">⚠ Recommendations</div><ul class="rec-list">${result.recommendations.map(r=>`<li>${esc(r)}</li>`).join('')}</ul></div>`:'';
  let exH=result.example_code?`<div class="sub-block"><div class="sub-label">Example · ${esc(result.example_context||'')}</div><div class="code-pre">${esc(result.example_code)}</div></div>`:result.example_context?`<div style="padding:0 14px 12px;font-size:12px;color:var(--muted);font-style:italic">${esc(result.example_context)}</div>`:'';
  const open=isNew;
  const card=document.createElement('div');
  card.className='card';card.id=id;
  card.innerHTML=`
    <div class="card-header" onclick="toggleCard('${id}')">
      <span class="badge ${bcls}">${esc(btext)}</span>${titleH}
      <span class="chevron ${open?'open':''}" id="chev-${id}">▾</span>
    </div>
    <div class="summary" id="sum-${id}" style="display:${open?'none':'block'}">${esc(result.description||result.summary||'')}</div>
    <div id="body-${id}" style="display:${open?'block':'none'}">
      <div class="body">
        <div class="ctrl-tag">${controller.toUpperCase()}</div>
        <div class="body-desc">${esc(result.description||result.summary||'')}</div>
        ${result.details?`<p>${linkify(result.details,result.keywords)}</p>`:''}
      </div>
      ${inputH}${linesH}${recH}${exH}
    </div>`;
  return card;
}

function toggleCard(id){
  const body=document.getElementById('body-'+id);
  const sum=document.getElementById('sum-'+id);
  const chev=document.getElementById('chev-'+id);
  const open=body.style.display!=='none';
  body.style.display=open?'none':'block';
  sum.style.display=open?'block':'none';
  chev.classList.toggle('open',!open);
}

function collapseAllCards(){
  document.querySelectorAll('.card').forEach(card=>{
    const id=card.id;
    const body=document.getElementById('body-'+id);
    const sum=document.getElementById('sum-'+id);
    const chev=document.getElementById('chev-'+id);
    if(body && body.style.display!=='none'){
      body.style.display='none';
      sum.style.display='block';
      chev.classList.remove('open');
    }
  });
}

async function doLookup(prompt,inputBlock,local){
  busy=true;document.getElementById('enter-btn').disabled=true;
  hidePH();
  const out=document.getElementById('output');
  if(local){
    collapseAllCards();
    const card=makeCard(local,true,null);
    out.insertBefore(card,out.firstChild);
    out.scrollTop=0;busy=false;upd();return;
  }
  const loader=document.createElement('div');
  loader.className='loading';loader.id='loader';
  loader.innerHTML='<div class="spinner"></div><span style="font-family:var(--mono);font-size:13px;color:var(--muted)">Analysing…</span>';
  out.insertBefore(loader,out.firstChild);
  try{
    const result=await callClaude(prompt);
    loader.remove();
    collapseAllCards();
    out.insertBefore(makeCard(result,true,inputBlock),out.firstChild);
    out.scrollTop=0;
  }catch(e){
    loader.remove();
    const err=document.createElement('div');
    err.className='err';
    err.textContent='⚠ '+(e.message.includes('JSON')?'Unexpected response — please try again.':'Connection error — app must be hosted online for API calls.');
    out.insertBefore(err,out.firstChild);
  }
  busy=false;upd();
}

function lookupCode(){
  const code=buf.trim();if(!code||busy)return;
  clearAll();
  const local=dbLookup(code);
  doLookup(local?null:`Look up this CNC code for ${controller.toUpperCase()} and return JSON only: ${code}`,null,local);
}
function analyseBlock(){
  const block=document.getElementById('block-ta').value.trim();
  if(!block||busy)return;
  doLookup(`Analyse this G-code block for ${controller.toUpperCase()} and return JSON only:\n${block}`,block,null);
}
function lookupKw(kw){
  if(busy)return;
  doLookup(`Explain this CNC term for ${controller.toUpperCase()}. type="single", code="${kw}", title=short definition. JSON only.`,null,null);
}

if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone)
  document.getElementById('ios-hint').classList.add('show');
</script>
